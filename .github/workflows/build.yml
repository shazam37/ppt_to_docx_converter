name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-pptx python-docx customtkinter matplotlib numpy pyinstaller

    - name: Build Windows Executable
      run: |
        pyinstaller --name="PPT-to-DOC-Converter" --onefile --windowed --icon=NONE --hidden-import=PIL._tkinter_finder --hidden-import=customtkinter --hidden-import=pptx --hidden-import=docx main.py

    - name: Upload Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: PPT-to-DOC-Converter-Windows
        path: dist/PPT-to-DOC-Converter.exe
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-pptx python-docx customtkinter matplotlib numpy pyinstaller

    - name: Build Linux Executable
      run: |
        pyinstaller --name="PPT-to-DOC-Converter" --onefile --windowed --icon=NONE --hidden-import=PIL._tkinter_finder --hidden-import=customtkinter --hidden-import=pptx --hidden-import=docx main.py

    - name: Upload Linux Executable
      uses: actions/upload-artifact@v4
      with:
        name: PPT-to-DOC-Converter-Linux
        path: dist/PPT-to-DOC-Converter
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-pptx python-docx customtkinter matplotlib numpy pyinstaller

    - name: Build macOS Executable
      run: |
        pyinstaller --name="PPT-to-DOC-Converter" --onefile --windowed --icon=NONE --hidden-import=PIL._tkinter_finder --hidden-import=customtkinter --hidden-import=pptx --hidden-import=docx main.py

    - name: Upload macOS Executable
      uses: actions/upload-artifact@v4
      with:
        name: PPT-to-DOC-Converter-macOS
        path: dist/PPT-to-DOC-Converter
        retention-days: 30
